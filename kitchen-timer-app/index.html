<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kitchen Timer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>
<h1>👩🏼‍🍳 Kitchen Timer</h1>

<p>Select a food item to time</p>

<div id="timer-buttons"></div>
<button onclick="resetTimer()">Reset</button>
<button id="pauseBtn" onclick="pauseTimer()" disabled>Pause</button>
<button id="resumeBtn" onclick="resumeTimer()" disabled>Resume</button>

<p id="status"></p>
<div id="foodItem">👩🏼‍🍳</div>
<h2 id="timer">00:00</h2>

<div class="progress-bar">
  <div id="progress"></div>
</div>

<audio id="alarm" src="alarm.mp3"></audio>
<script src="script.js"></script>

</body>
</html>
